  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lertCount }}<\u002Fspan><\u002Fsc-if>\n      <\u002Fbutton>\n\n      <sc-if value=\"{{ alertsOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onclick=\"{{ closeAlerts }}\" style=\"position:fixed;inset:0;z-index:110;\"><\u002Fdiv>\n        <div style=\"position:absolute;top:calc(100% + 12px);right:0;width:400px;max-width:calc(100vw - 44px);background:#fff;border:1px solid #e4e4e7;border-radius:16px;box-shadow:0 18px 50px rgba(0,0,0,.18);z-index:120;overflow:hidden;\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid #f0f0f1;\">\n            <div style=\"display:flex;align-items:center;gap:9px;\"><span style=\"font-size:15px;font-weight:800;letter-spacing:-.2px;\">Notifications<\u002Fspan><sc-if value=\"{{ hasAlerts }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"background:#1e3a8a;color:#fff;border-radius:99px;font-size:11px;font-weight:800;min-width:19px;height:19px;padding:0 5px;display:inline-flex;align-items:center;justify-content:center;\">{{ alertCount }}<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n            <sc-if value=\"{{ hasAlerts }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ clearAllAlerts }}\" style=\"background:none;border:none;color:#1e3a8a;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;\">Clear all<\u002Fbutton><\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"max-height:calc(100vh - 130px);overflow-y:auto;\">\n            <sc-if value=\"{{ noAlerts }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:44px 24px;text-align:center;\">\n                <div style=\"width:44px;height:44px;border-radius:12px;background:#f4f4f5;color:#a1a1aa;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9\"><\u002Fpath><path d=\"M13.73 21a2 2 0 01-3.46 0\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <div style=\"font-size:15px;font-weight:700;margin-bottom:4px;\">You're all caught up<\u002Fdiv>\n                <div style=\"font-size:13px;color:#71717a;line-height:1.5;max-width:260px;margin:0 auto;\">Your agent keeps watching your saved cars — new price drops and matches will show up here.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-for list=\"{{ alertList }}\" as=\"a\" hint-placeholder-count=\"4\">\n              <div style=\"position:relative;padding:16px 18px;border-bottom:1px solid #f4f4f5;\">\n                <button onclick=\"{{ a.onDismiss }}\" aria-label=\"Dismiss\" style=\"position:absolute;top:13px;right:13px;background:none;border:none;color:#c4c4cc;font-size:17px;line-height:1;cursor:pointer;font-family:inherit;padding:2px;\">×<\u002Fbutton>\n                <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:9px;\">\n                  <span style=\"{{ a.tagStyle }}\">{{ a.type }}<\u002Fspan>\n                  <span style=\"width:4px;height:4px;border-radius:50%;background:#d4d4d8;\"><\u002Fspan>\n                  <span style=\"font-size:12px;color:#a1a1aa;font-weight:600;\">{{ a.time }}<\u002Fspan>\n                <\u002Fdiv>\n                <div onclick=\"{{ a.onOpen }}\" style=\"{{ a.bodyStyle }}\">\n                  <div style=\"font-size:15px;font-weight:700;letter-spacing:-.2px;margin-bottom:4px;padding-right:16px;\">{{ a.title }}<\u002Fdiv>\n                  <div style=\"font-size:13px;line-height:1.55;color:#52525b;\">{{ a.body }}<\u002Fdiv>\n                  <sc-if value=\"{{ a.hasCta }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:12.5px;font-weight:700;color:#1e3a8a;margin-top:9px;\">{{ a.cta }} →<\u002Fdiv><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <div style=\"padding-top:56px;\">\n\n    <!-- ====================== 1. LANDING ====================== -->\n    <sc-if value=\"{{ sLanding }}\" hint-placeholder-val=\"{{ true }}\">\n    <div data-screen-label=\"Landing\" style=\"min-height:calc(100vh - 46px);background:#fff;\">\n      <div style=\"max-width:960px;margin:0 auto;padding:90px 32px 40px;text-align:center;\">\n        <div style=\"display:inline-flex;align-items:center;gap:8px;background:#eef3fb;border:1px solid #d8e2f4;border-radius:99px;padding:6px 14px;margin-bottom:34px;\">\n          <span style=\"position:relative;width:8px;height:8px;\"><span style=\"position:absolute;inset:0;border-radius:50%;background:#1e3a8a;\"><\u002Fspan><\u002Fspan>\n          <span style=\"font-size:13px;font-weight:600;color:#1e3a8a;\">Your car-buying agent — works between visits<\u002Fspan>\n        <\u002Fdiv>\n        <h1 style=\"font-size:50px;line-height:1.08;font-weight:800;letter-spacing:-1.4px;margin:0 auto 26px;max-width:820px;\">The right car, at <span style=\"color:#1e3a8a;\">the right price<\u002Fspan> — watched until you sign.<\u002Fh1>\n        <p style=\"font-size:19px;line-height:1.5;color:#52525b;max-width:560px;margin:0 auto 36px;\">You don't need to know a single car model. Answer a few plain questions and your agent handles the rest.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:14px;\">\n          <button onclick=\"{{ startIntake }}\" style=\"display:inline-flex;align-items:center;gap:10px;background:#1e3a8a;color:#fff;border:none;border-radius:10px;padding:17px 34px;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 2px 10px rgba(30,58,138,.25);\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"display:block;\"><path d=\"M5 13l1.2-3.6A2 2 0 018.1 8h7.8a2 2 0 011.9 1.4L19 13\"><\u002Fpath><path d=\"M5 13h14v4a1 1 0 01-1 1h-1a1 1 0 01-1-1v-1H8v1a1 1 0 01-1 1H6a1 1 0 01-1-1z\"><\u002Fpath><circle cx=\"7.5\" cy=\"15.5\" r=\".6\"><\u002Fcircle><circle cx=\"16.5\" cy=\"15.5\" r=\".6\"><\u002Fcircle><circle cx=\"17\" cy=\"6\" r=\"3.4\"><\u002Fcircle><path d=\"M19.6 8.6L22 11\"><\u002Fpath><\u002Fsvg>Get Started<\u002Fbutton>\n          <span style=\"font-size:13px;color:#71717a;\">Takes about 2 minutes · No car-model knowledge needed · Free<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"max-width:960px;margin:0 auto;padding:30px 32px 90px;\">\n        <div style=\"text-align:center;font-size:12px;font-weight:700;letter-spacing:1.4px;color:#a1a1aa;margin-bottom:26px;\">HOW IT WORKS<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;\">\n          <div style=\"background:#fafafa;border:1px solid #e4e4e7;border-radius:14px;padding:26px;\">\n            <div style=\"width:34px;height:34px;border-radius:9px;background:#1e3a8a;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;margin-bottom:16px;\">1<\u002Fdiv>\n            <div style=\"font-size:17px;font-weight:700;margin-bottom:7px;\">Answer questions<\u002Fdiv>\n            <div style=\"font-size:14px;line-height:1.5;color:#52525b;\">Tell us your budget, how you'll use it, and what matters. Plain language, no jargon.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fafafa;border:1px solid #e4e4e7;border-radius:14px;padding:26px;\">\n            <div style=\"width:34px;height:34px;border-radius:9px;background:#1e3a8a;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;margin-bottom:16px;\">2<\u002Fdiv>\n            <div style=\"font-size:17px;font-weight:700;margin-bottom:7px;\">Agent watches the market<\u002Fdiv>\n            <div style=\"font-size:14px;line-height:1.5;color:#52525b;\">It ranks the best models for you and keeps scanning listings and prices — day and night.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fafafa;border:1px solid #e4e4e7;border-radius:14px;padding:26px;\">\n            <div style=\"width:34px;height:34px;border-radius:9px;background:#1e3a8a;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;margin-bottom:16px;\">3<\u002Fdiv>\n            <div style=\"font-size:17px;font-weight:700;margin-bottom:7px;\">Get a negotiation packet<\u002Fdiv>\n            <div style=\"font-size:14px;line-height:1.5;color:#52525b;\">When the deal is right, you get an out-the-door price, a script, and a message ready to send.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ====================== 2. INTAKE ====================== -->\n    <sc-if value=\"{{ sIntake }}\" hint-placeholder-val=\"{{ true }}\">\n    <div data-screen-label=\"Intake\" style=\"min-height:calc(100vh - 46px);background:#fff;display:flex;flex-direction:column;\">\n      <!-- progress -->\n      <div style=\"max-width:680px;width:100%;margin:0 auto;padding:30px 32px 0;\">\n        <sc-if value=\"{{ intakeInQuestions }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;\">\n          <span style=\"font-size:13px;font-weight:600;color:#71717a;\">{{ stepLabel }}<\u002Fspan>\n          <button onclick=\"{{ goLanding }}\" style=\"background:none;border:none;color:#a1a1aa;font-size:13px;cursor:pointer;font-family:inherit;\">Save &amp; exit<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"height:5px;background:#f0f0f1;border-radius:99px;overflow:hidden;\"><div style=\"height:100%;background:#1e3a8a;border-radius:99px;width:{{ progressPct }};transition:width .3s ease;\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"max-width:680px;width:100%;margin:0 auto;flex:1;padding:48px 32px;display:flex;flex-direction:column;justify-content:center;\">\n\n        <!-- step 1 usage -->\n        <sc-if value=\"{{ st1 }}\" hint-placeholder-val=\"{{ true }}\">\n        <h2 style=\"font-size:32px;font-weight:800;letter-spacing:-.8px;margin:0 0 8px;\">What will this car mostly do for you?<\u002Fh2>\n        <p style=\"font-size:16px;color:#71717a;margin:0 0 30px;\">Pick all that apply — your agent balances every use you choose.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n          <sc-for list=\"{{ usageOpts }}\" as=\"o\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\"><span style=\"display:flex;align-items:flex-start;gap:13px;\"><span style=\"{{ o.boxStyle }}\"><sc-if value=\"{{ o.checked }}\" hint-placeholder-val=\"{{ false }}\">✓<\u002Fsc-if><\u002Fspan><span><span style=\"font-size:16px;font-weight:600;\">{{ o.label }}<\u002Fspan><span style=\"font-size:13px;color:#71717a;display:block;margin-top:2px;\">{{ o.sub }}<\u002Fspan><\u002Fspan><\u002Fspan><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- step 2 radius -->\n        <sc-if value=\"{{ st2 }}\" hint-placeholder-val=\"{{ true }}\">\n        <h2 style=\"font-size:32px;font-weight:800;letter-spacing:-.8px;margin:0 0 8px;\">How far will you go to pick it up?<\u002Fh2>\n        <p style=\"font-size:16px;color:#71717a;margin:0 0 34px;\">A wider radius usually means better deals.<\u002Fp>\n        <div style=\"background:#fafafa;border:1px solid #e4e4e7;border-radius:14px;padding:28px;\">\n          <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:22px;\"><span style=\"font-size:44px;font-weight:800;color:#1e3a8a;letter-spacing:-1px;\">{{ radius }}<\u002Fspan><span style=\"font-size:18px;color:#52525b;font-weight:600;\">miles from {{ zip }}<\u002Fspan><\u002Fdiv>\n          <input type=\"range\" min=\"10\" max=\"200\" step=\"5\" value=\"{{ radius }}\" onchange=\"{{ onRadius }}\" style=\"width:100%;\">\n          <div style=\"display:flex;justify-content:space-between;font-size:12px;color:#a1a1aa;margin-top:8px;\"><span>10 mi<\u002Fspan><span>200 mi<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- step 3 timeline -->\n        <sc-if value=\"{{ st3 }}\" hint-placeholder-val=\"{{ true }}\">\n        <h2 style=\"font-size:32px;font-weight:800;letter-spacing:-.8px;margin:0 0 8px;\">When do you want to be driving it?<\u002Fh2>\n        <p style=\"font-size:16px;color:#71717a;margin:0 0 30px;\">This sets how aggressively your agent acts.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n          <sc-for list=\"{{ timelineOpts }}\" as=\"o\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\"><span style=\"font-size:16px;font-weight:600;\">{{ o.label }}<\u002Fspan><span style=\"font-size:13px;color:#71717a;display:block;margin-top:2px;\">{{ o.sub }}<\u002Fspan><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- step 4 budget (adaptive) -->\n        <sc-if value=\"{{ st4 }}\" hint-placeholder-val=\"{{ true }}\">\n        <h2 style=\"font-size:32px;font-weight:800;letter-spacing:-.8px;margin:0 0 8px;\">What's your budget?<\u002Fh2>\n        <p style=\"font-size:16px;color:#71717a;margin:0 0 26px;\">However you think about money is fine.<\u002Fp>\n        <div style=\"display:flex;gap:8px;background:#f0f0f1;border-radius:11px;padding:5px;margin-bottom:26px;\">\n          <button onclick=\"{{ setCash }}\" style=\"{{ cashTabStyle }}\">Cash total<\u002Fbutton>\n          <button onclick=\"{{ setMonthly }}\" style=\"{{ monthlyTabStyle }}\">Monthly payment<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ isCash }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:#fafafa;border:1px solid #e4e4e7;border-radius:14px;padding:28px;\">\n            <div style=\"display:flex;align-items:baseline;gap:8px;margin-bottom:22px;\"><span style=\"font-size:44px;font-weight:800;color:#1e3a8a;letter-spacing:-1px;\">{{ cashLabel }}<\u002Fspan><span style=\"font-size:16px;color:#52525b;font-weight:600;\">all-in, out the door<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" min=\"8000\" max=\"60000\" step=\"500\" value=\"{{ cashTotal }}\" onchange=\"{{ onCash }}\" style=\"width:100%;\">\n            <div style=\"display:flex;justify-content:space-between;font-size:12px;color:#a1a1aa;margin-top:8px;\"><span>$8k<\u002Fspan><span>$60k<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ isMonthly }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:#fafafa;border:1px solid #e4e4e7;border-radius:14px;padding:28px;\">\n            <div style=\"display:flex;align-items:baseline;gap:8px;margin-bottom:22px;\"><span style=\"font-size:44px;font-weight:800;color:#1e3a8a;letter-spacing:-1px;\">{{ monthlyLabel }}<\u002Fspan><span style=\"font-size:16px;color:#52525b;font-weight:600;\">/ month<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" min=\"150\" max=\"900\" step=\"10\" value=\"{{ monthly }}\" onchange=\"{{ onMonthly }}\" style=\"width:100%;\">\n            <div style=\"display:flex;justify-content:space-between;font-size:12px;color:#a1a1aa;margin-top:8px;margin-bottom:24px;\"><span>$150<\u002Fspan><span>$900<\u002Fspan><\u002Fdiv>\n            <!-- adaptive follow-up -->\n            <div style=\"border-top:1px dashed #d4d4d8;padding-top:22px;\">\n              <div style=\"font-size:13px;font-weight:700;color:#1e3a8a;margin-bottom:14px;\">A couple more, since you're financing →<\u002Fdiv>\n              <div style=\"display:flex;gap:18px;flex-wrap:wrap;\">\n                <label style=\"flex:1;min-width:160px;\"><span style=\"font-size:13px;font-weight:600;color:#52525b;display:block;margin-bottom:8px;\">Down payment: {{ downLabel }}<\u002Fspan><input type=\"range\" min=\"0\" max=\"10000\" step=\"250\" value=\"{{ down }}\" onchange=\"{{ onDown }}\" style=\"width:100%;\"><\u002Flabel>\n                <label style=\"flex:1;min-width:160px;\"><span style=\"font-size:13px;font-weight:600;color:#52525b;display:block;margin-bottom:8px;\">Loan term: {{ term }} months<\u002Fspan><input type=\"range\" min=\"24\" max=\"84\" step=\"12\" value=\"{{ term }}\" onchange=\"{{ onTerm }}\" style=\"width:100%;\"><\u002Flabel>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showNotes }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"margin-top:18px;background:#fffbeb;border:1px solid #f3e3a3;border-left:3px solid #d4a72c;border-radius:8px;padding:13px 15px;\">\n            <span style=\"font-size:10px;font-weight:700;letter-spacing:.8px;color:#a8801a;display:block;margin-bottom:3px;\">ADAPTIVE LOGIC<\u002Fspan>\n            <span style=\"font-size:13px;line-height:1.5;color:#52525b;\">The down-payment and loan-term questions <strong>only appear<\u002Fstrong> when \"Monthly payment\" is selected. A cash buyer never sees them.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <\u002Fsc-if>\n\n        <!-- step 5 priorities -->\n        <sc-if value=\"{{ st5 }}\" hint-placeholder-val=\"{{ true }}\">\n        <h2 style=\"font-size:32px;font-weight:800;letter-spacing:-.8px;margin:0 0 8px;\">What matters most to you?<\u002Fh2>\n        <p style=\"font-size:16px;color:#71717a;margin:0 0 30px;\">Drag to weight each one. The agent ranks cars on these.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:24px;\">\n          <div><div style=\"display:flex;justify-content:space-between;margin-bottom:8px;\"><span style=\"font-size:15px;font-weight:600;\">Reliability<\u002Fspan><span style=\"font-size:13px;font-weight:700;color:#1e3a8a;\">{{ wRelLabel }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"0\" max=\"100\" value=\"{{ wRel }}\" onchange=\"{{ onRel }}\" style=\"width:100%;\"><\u002Fdiv>\n          <div><div style=\"display:flex;justify-content:space-between;margin-bottom:8px;\"><span style=\"font-size:15px;font-weight:600;\">Resale value<\u002Fspan><span style=\"font-size:13px;font-weight:700;color:#1e3a8a;\">{{ wResaleLabel }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"0\" max=\"100\" value=\"{{ wResale }}\" onchange=\"{{ onResale }}\" style=\"width:100%;\"><\u002Fdiv>\n          <div><div style=\"display:flex;justify-content:space-between;margin-bottom:8px;\"><span style=\"font-size:15px;font-weight:600;\">Running cost<\u002Fspan><span style=\"font-size:13px;font-weight:700;color:#1e3a8a;\">{{ wRunLabel }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"0\" max=\"100\" value=\"{{ wRun }}\" onchange=\"{{ onRun }}\" style=\"width:100%;\"><\u002Fdiv>\n          <div><div style=\"display:flex;justify-content:space-between;margin-bottom:8px;\"><span style=\"font-size:15px;font-weight:600;\">Performance &amp; fun<\u002Fspan><span style=\"font-size:13px;font-weight:700;color:#1e3a8a;\">{{ wPerfLabel }}<\u002Fspan><\u002Fdiv><input type=\"range\" min=\"0\" max=\"100\" value=\"{{ wPerf }}\" onchange=\"{{ onPerf }}\" style=\"width:100%;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- step 6 condition -->\n        <sc-if value=\"{{ st6 }}\" hint-placeholder-val=\"{{ true }}\">\n        <h2 style=\"font-size:32px;font-weight:800;letter-spacing:-.8px;margin:0 0 8px;\">New, used, or open to both?<\u002Fh2>\n        <p style=\"font-size:16px;color:#71717a;margin:0 0 30px;\">Most first-time buyers save the most staying open.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n          <sc-for list=\"{{ condOpts }}\" as=\"o\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\"><span style=\"font-size:16px;font-weight:600;\">{{ o.label }}<\u002Fspan><span style=\"font-size:13px;color:#71717a;display:block;margin-top:2px;\">{{ o.sub }}<\u002Fspan><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- step 7 fuel type -->\n        <sc-if value=\"{{ stFuel }}\" hint-placeholder-val=\"{{ false }}\">\n        <h2 style=\"font-size:32px;font-weight:800;letter-spacing:-.8px;margin:0 0 8px;\">How do you want it powered?<\u002Fh2>\n        <p style=\"font-size:16px;color:#71717a;margin:0 0 30px;\">No wrong answer — this just shapes what the agent ranks.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n          <sc-for list=\"{{ fuelOpts }}\" as=\"o\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\"><span style=\"font-size:16px;font-weight:600;\">{{ o.label }}<\u002Fspan><span style=\"font-size:13px;color:#71717a;display:block;margin-top:2px;\">{{ o.sub }}<\u002Fspan><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- step 8 fuel cost -->\n        <sc-if value=\"{{ stFuelCost }}\" hint-placeholder-val=\"{{ false }}\">\n        <h2 style=\"font-size:32px;font-weight:800;letter-spacing:-.8px;margin:0 0 8px;\">{{ fuelCostTitle }}<\u002Fh2>\n        <p style=\"font-size:16px;color:#71717a;margin:0 0 34px;\">The agent flags any car that would blow past this.<\u002Fp>\n        <div style=\"background:#fafafa;border:1px solid #e4e4e7;border-radius:14px;padding:28px;\">\n          <div style=\"display:flex;align-items:baseline;gap:8px;margin-bottom:22px;\"><span style=\"font-size:44px;font-weight:800;color:#1e3a8a;letter-spacing:-1px;\">{{ fuelCostLabel }}<\u002Fspan><span style=\"font-size:16px;color:#52525b;font-weight:600;\">/ month {{ fuelCostWord }}<\u002Fspan><\u002Fdiv>\n          <input type=\"range\" min=\"0\" max=\"400\" step=\"10\" value=\"{{ fuelCost }}\" onchange=\"{{ onFuelCost }}\" style=\"width:100%;\">\n          <div style=\"display:flex;justify-content:space-between;font-size:12px;color:#a1a1aa;margin-top:8px;\"><span>$0<\u002Fspan><span>$400<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ fuelIsEv }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:16px;background:#eef3fb;border:1px solid #d8e2f4;border-radius:10px;padding:13px 15px;font-size:13px;line-height:1.5;color:#1e3a8a;\">Most EV owners charging at home spend <strong>$30–60/mo<\u002Fstrong> — usually well under a gas budget.<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showNotes }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:16px;background:#fffbeb;border:1px solid #f3e3a3;border-left:3px solid #d4a72c;border-radius:8px;padding:13px 15px;\"><span style=\"font-size:10px;font-weight:700;letter-spacing:.8px;color:#a8801a;display:block;margin-bottom:3px;\">ADAPTIVE LOGIC<\u002Fspan><span style=\"font-size:13px;line-height:1.5;color:#52525b;\">This question reframes to \"energy\" and shows a charging-cost hint when Electric is chosen — the label adapts to the earlier answer.<\u002Fspan><\u002Fdiv>\n        <\u002Fsc-if>\n        <\u002Fsc-if>\n\n        <!-- step 9 must-haves -->\n        <sc-if value=\"{{ st7 }}\" hint-placeholder-val=\"{{ true }}\">\n        <h2 style=\"font-size:32px;font-weight:800;letter-spacing:-.8px;margin:0 0 8px;\">Any non-negotiables?<\u002Fh2>\n        <p style=\"font-size:16px;color:#71717a;margin:0 0 30px;\">Optional. Tap any that are true dealbreakers.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px;\">\n          <sc-for list=\"{{ mustHaves }}\" as=\"m\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ m.onClick }}\" style=\"{{ m.style }}\">{{ m.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n          <sc-for list=\"{{ customChips }}\" as=\"c\" hint-placeholder-count=\"0\">\n            <button onclick=\"{{ c.onRemove }}\" style=\"border-radius:99px;padding:11px 16px 11px 18px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;background:#1e3a8a;color:#fff;border:2px solid #1e3a8a;display:inline-flex;align-items:center;gap:8px;\">{{ c.label }}<span style=\"font-size:16px;line-height:1;opacity:.7;\">×<\u002Fspan><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:18px;\">\n          <label style=\"font-size:13px;font-weight:600;color:#52525b;display:block;margin-bottom:8px;\">Something else? Add your own<\u002Flabel>\n          <div style=\"display:flex;gap:8px;\">\n            <input type=\"text\" value=\"{{ newMust }}\" onchange=\"{{ onNewMust }}\" onkeydown=\"{{ onNewMustKey }}\" placeholder=\"e.g. Heated seats, tow hitch, red…\" style=\"flex:1;border:2px solid #e4e4e7;border-radius:99px;padding:11px 18px;font-size:14px;font-family:inherit;color:#18181b;outline:none;\" style-focus=\"border-color:#1e3a8a;\">\n            <button onclick=\"{{ addCustomMust }}\" style=\"{{ addBtnStyle }}\">Add<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- review -->\n        <sc-if value=\"{{ stReview }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:inline-flex;align-items:center;gap:8px;margin-bottom:14px;\"><div style=\"width:26px;height:26px;border-radius:7px;background:#eef3fb;display:flex;align-items:center;justify-content:center;color:#1e3a8a;font-weight:700;\">✓<\u002Fdiv><span style=\"font-size:13px;font-weight:700;color:#1e3a8a;letter-spacing:.3px;\">YOUR BRIEF<\u002Fspan><\u002Fdiv>\n        <h2 style=\"font-size:32px;font-weight:800;letter-spacing:-.8px;margin:0 0 28px;\">Here's what I heard.<\u002Fh2>\n        <div style=\"border:1px solid #e4e4e7;border-radius:14px;overflow:hidden;\">\n          <sc-for list=\"{{ summary }}\" as=\"row\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;gap:16px;padding:16px 20px;border-bottom:1px solid #f0f0f1;\">\n              <div><div style=\"font-size:12px;color:#a1a1aa;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;\">{{ row.k }}<\u002Fdiv><div style=\"font-size:16px;font-weight:600;\">{{ row.v }}<\u002Fdiv><\u002Fdiv>\n              <button onclick=\"{{ row.onEdit }}\" style=\"background:none;border:none;color:#1e3a8a;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0;\">Edit<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <button onclick=\"{{ findCars }}\" style=\"margin-top:26px;width:100%;background:#1e3a8a;color:#fff;border:none;border-radius:11px;padding:18px;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 2px 10px rgba(30,58,138,.25);\">Find my cars →<\u002Fbutton>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n\n      <!-- footer nav -->\n      <sc-if value=\"{{ intakeInQuestions }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"border-top:1px solid #e4e4e7;background:#fff;\">\n        <div style=\"max-width:680px;margin:0 auto;padding:18px 32px;display:flex;justify-content:space-between;align-items:center;\">\n          <button onclick=\"{{ back }}\" style=\"background:none;border:none;color:#71717a;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;\">← Back<\u002Fbutton>\n          <button onclick=\"{{ next }}\" style=\"background:#1e3a8a;color:#fff;border:none;border-radius:10px;padding:13px 30px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;\">{{ nextLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ====================== 3. SCANNING ====================== -->\n    <sc-if value=\"{{ sScanning }}\" hint-placeholder-val=\"{{ true }}\">\n    <div data-screen-label=\"Sc         <\u002Fdiv>\n        <button onclick=\"{{ goShortlist }}\" style=\"margin-top:22px;background:none;border:none;color:#1e3a8a;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;\">Skip ahead to shortlist (demo) →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ====================== 4. SHORTLIST ====================== -->\n    <sc-if value=\"{{ sShortlist }}\" hint-placeholder-val=\"{{ true }}\">\n    <div data-screen-label=\"Shortlist\" style=\"min-height:calc(100vh - 46px);\">\n      <div style=\"max-width:1440px;margin:0 auto;padding:28px 24px;display:grid;grid-template-columns:248px 1fr;gap:24px;align-items:start;\">\n        <!-- brief rail -->\n        <aside style=\"position:sticky;top:88px;background:#fff;border:1px solid #e4e4e7;border-radius:14px;padding:20px;\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;\"><span style=\"font-size:12px;font-weight:700;letter-spacing:.6px;color:#a1a1aa;\">YOUR BRIEF<\u002Fspan><button onclick=\"{{ goIntake }}\" style=\"background:none;border:none;color:#1e3a8a;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;\">Edit<\u002Fbutton><\u002Fdiv>\n          <sc-for list=\"{{ briefRows }}\" as=\"b\" hint-placeholder-count=\"5\">\n            <div style=\"margin-bottom:14px;\"><div style=\"font-size:11px;color:#a1a1aa;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;\">{{ b.k }}<\u002Fdiv><div style=\"font-size:14px;font-weight:600;color:#27272a;\">{{ b.v }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"border-top:1px solid #f0f0f1;margin-top:6px;padding-top:16px;\">\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:6px;\"><span style=\"position:relative;width:8px;height:8px;\"><span style=\"position:absolute;inset:0;border-radius:50%;background:#1e8a5b;\"><\u002Fspan><span style=\"position:absolute;inset:0;border-radius:50%;background:#1e8a5b;animation:lapulse 2.2s ease-out infinite;\"><\u002Fspan><\u002Fspan><span style=\"font-size:13px;font-weight:700;color:#1e8a5b;\">Agent is watching<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:12px;color:#71717a;line-height:1.4;\">Last scanned 6 min ago · 214 listings in range<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Faside>\n\n        <!-- main -->\n        <div>\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px;flex-wrap:wrap;gap:10px;\">\n            <div><h1 style=\"font-size:26px;font-weight:800;letter-spacing:-.6px;margin:0;\">Your top picks<\u002Fh1><p style=\"font-size:14px;color:#71717a;margin:5px 0 0;\">Here are your top picks — {{ allCount }} cars matched to your brief and ranked by fit, so you don't have to sift.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:10px;flex-shrink:0;\">\n              <button onclick=\"{{ goPackets }}\" style=\"display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid #e4e4e7;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:600;font-family:inherit;color:#52525b;cursor:pointer;\" style-hover=\"border-color:#c9d6ef;color:#1e3a8a;\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"display:block;\"><path d=\"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z\"><\u002Fpath><path d=\"M14 2v6h6\"><\u002Fpath><path d=\"M8 13h8\"><\u002Fpath><path d=\"M8 17h8\"><\u002Fpath><\u002Fsvg>\n                Deal packets ({{ packetCount }})\n              <\u002Fbutton>\n              <label style=\"position:relative;display:inline-flex;align-items:center;\">\n                <sc-raw-select value=\"{{ sortBy }}\" onchange=\"{{ onSort }}\" style=\"{{ sortSelectStyle }}\">\n                  <sc-for list=\"{{ sortOpts }}\" as=\"o          <sc-if value=\"{{ filterEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"grid-column:1 / -1;text-align:center;background:#fff;border:1px dashed #d4d4d8;border-radius:14px;padding:46px 28px;\">\n                <div style=\"font-size:17px;font-weight:700;margin-bottom:6px;\">No cars match these filters.<\u002Fdiv>\n                <p style=\"font-size:14px;color:#71717a;line-height:1.55;max-width:360px;margin:0 auto 16px;\">Try widening the condition or fuel type — your agent keeps scanning for more as they appear.<\u002Fp>\n                <button onclick=\"{{ onClearFilters }}\" style=\"background:#1e3a8a;color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;\">Clear filters<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-for list=\"{{ shortlistCars }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;padding:11px 16px 11px 18px;border-bottom:1px solid #f0f0f1;\">\n                  <button onclick=\"{{ c.onCompare }}\" style=\"{{ c.compareStyle }}\"><span style=\"{{ c.compareBoxStyle }}\">{{ c.compareMark }}<\u002Fspan>Compare<\u002Fbutton>\n                  <div style=\"display:flex;align-items:center;gap:10px;\">\n                    <sc-if value=\"{{ c.saved }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:inline-flex;align-items:center;gap:6px;background:#eef3fb;border:1px solid #d8e2f4;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700;color:#1e3a8a;\"><span style=\"position:relative;width:7px;height:7px;\"><span style=\"position:absolute;inset:0;border-radius:50%;background:#1e3a8a;\"><\u002Fspan><span style=\"position:absolute;inset:0;border-radius:50%;backgroun ont-size:13px;font-weight:700;\">Fair price<\u002Fspan><span style=\"background:#fbedea;color:#b4533a;border:1px solid #f0c8bd;border-radius:99px;padding:5px 12px;font-size:13px;font-weight:700;\">Overpriced<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:14px;padding:22px;\"><div style=\"font-size:12px;font-weight:700;color:#a1a1aa;letter-spacing:.5px;margin-bottom:16px;\">AGENT-STATUS INDICATOR<\u002Fdiv><div style=\"display:flex;align-items:center;gap:8px;\"><span style=\"position:relative;width:9px;height:9px;\"><span style=\"position:absolute;inset:0;border-radius:50%;background:#1e8a5b;\"><\u002Fspan><span style=\"position:absolute;inset:0;border-radius:50%;background:#1e8a5b;animation:lapulse 2.2s ease-out infinite;\"><\u002Fspan><\u002Fspan><span style=\"font-size:14px;font-weight:700;color:#1e8a5b;\">Agent is watching<\u002Fspan><\u002Fdiv><div style=\"font-size:12px;color:#71717a;margin-top:6px;\">Last scanned 6 min ago<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:14px;padding:22px;\"><div style=\"font-size:12px;font-weight:700;color:#a1a1aa;letter-spacing:.5px;margin-bottom:16px;\">\"WHY THIS CAR?\" EXPANDABLE<\u002Fdiv><button onclick=\"{{ toggleDemo }}\" style=\"width:100%;text-align:left;background:#fafafa;border:1px solid #e4e4e7;border-radius:9px;padding:11px 14px;font-size:13px;font-weight:600;color:#1e3a8a;cursor:pointer;font-family:inherit;display:flex;justify-content:space-between;\">Why this car?<span style=\"color:#a1a1aa;\">{{ demoCaret }}<\u002Fspan><\u002Fbutton><sc-if value=\"{{ demoOpen }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"font-size:13px;line-height:1.55;color:#3f3f46;margin-top:10px;\">Written like a friend explaining — never a spec dump.<\u002Fdiv><\u002Fsc-if><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:14px;padding:22px;grid-column:span 2;\"><div style=\"font-size:12px;font-weight:700;color:#a1a1aa;letter-spacing:.5px;margin-bottom:16px;\">PLAIN-ENGLISH EXPLANATION CARD<\u002Fdiv><div style=\"background:#eef3fb;border:1px solid #c9d6ef;border-radius:11px;padding:16px 18px;font-size:14px;line-height:1.6;color:#27272a;\">Used prices on your shortlist rose about 8% this week, so a certified pre-owned car with maker financing now beats the deal we were targeting — here's the math.<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:14px;padding:22px;\"><div style=\"font-size:12px;font-weight:700;color:#a1a1aa;letter-spacing:.5px;margin-bottom:16px;\">SAVE / WATCH TOGGLE<\u002Fdiv><div style=\"display:flex;gap:14px;align-items:center;flex-wrap:wrap;\"><span style=\"font-size:26px;line-height:1;color:#a1a1aa;\">♡<\u002Fspan><span style=\"color:#a1a1aa;\">→<\u002Fspan><span style=\"font-size:26px;line-height:1;color:#1e3a8a;\">♥<\u002Fspan><span style=\"display:inline-flex;align-items:center;gap:6px;background:#eef3fb;border:1px solid #d8e2f4;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700;color:#1e3a8a;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#1e3a8a;\"><\u002Fspan>Watching closely<\u002Fspan><\u002Fdiv><div style=\"font-size:12px;color:#71717a;margin-top:12px;line-height:1.45;\">Outline heart saves &amp; watches a car; filled = saved. Saved cards get the \"Watching closely\" chip.<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:14px;padding:22px;\"><div style=\"font-size:12px;font-weight:700;color:#a1a1aa;letter-spacing:.5px;margin-bottom:16px;\">COMPARE CHECKBOX<\u002Fdiv><div style=\"display:flex;gap:16px;align-items:center;flex-wrap:wrap;\"><span style=\"display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#71717a;\"><span style=\"width:18px;height:18px;border-radius:5px;border:2px solid #c9d1da;background:#fff;\"><\u002Fspan>Compare<\u002Fspan><span style=\"display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#1e3a8a;\"><span style=\"width:18px;height:18px;border-radius:5px;border:2px solid #1e3a8a;background:#1e3a8a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;\">✓<\u002Fspan>Compare<\u002Fspan><\u002Fdiv><div style=\"font-size:12px;color:#71717a;margin-top:12px;line-height:1.45;\">Select up to 3 cars; a sticky bar appears with a Compare action.<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:14px;padding:22px;grid-column:span 2;\"><div style=\"font-size:12px;font-weight:700;color:#a1a1aa;letter-spacing:.5px;margin-bottom:16px;\">\"IF IT WERE ME\" RECOMMENDATION CARD<\u002Fdiv><div style=\"background:#eef3fb;border:1px solid #c9d6ef;border-left:4px solid #1e3a8a;border-radius:11px;padding:16px 18px;\"><div style=\"font-size:11px;font-weight:800;letter-spacing:.6px;color:#1e3a8a;margin-bottom:6px;\">IF IT WERE ME:<\u002Fdiv><div style=\"font-size:14px;line-height:1.6;color:#27272a;\">The CR-V — you weighted reliability highest, and it's the only one that stays under your walk-away number. Closes the compare screen with a single clear pick.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ====================== MOBILE ====================== -->\n    <sc-if value=\"{{ sMobile }}\" hint-placeholder-val=\"{{ true }}\">\n    <div data-screen-label=\"Mobile Shortlist\" style=\"min-height:calc(100vh - 46px);display:flex;flex-direction:column;align-items:center;padding:36px 20px;\">\n      <p style=\"font-size:14px;color:#71717a;margin:0 0 22px;text-align:center;max-width:420px;\">The Shortlist Dashboard responsive to mobile — the brief collapses into a top bar, cards stack full-width.<\u002Fp>\n      <div style=\"width:390px;height:780px;background:#18181b;border-radius:42px;padding:11px;box-shadow:0 20px 50px rgba(0,0,0,.25);flex-shrink:0;\">\n        <div style=\"width:100%;height:100%;background:#f4f4f5;border-radius:32px;overflow:hidden;display:flex;flex-direction:column;\">\n          <div style=\"background:#fff;border-bottom:1px solid #e4e4e7;padding:14px 16px 12px;flex-shrink:0;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;\"><span style=\"font-weight:800;font-size:17px;\">Your shortlist<\u002Fspan><span style=\"display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#1e8a5b;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#1e8a5b;\"><\u002Fspan>Watching<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:11px;color:#71717a;margin-top:4px;\">$450/mo · Commute · 60 mi · Last scan 6 min ago<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;\">\n            <sc-for list=\"{{ cars }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:13px;overflow:hidden;\">\n                <div style=\"height:96px;overflow:hidden;position:relative;\">\n                  <x-import component-from-global-scope=\"image-slot\" id=\"{{ c.slotId }}\" src=\"{{ c.slotSrc }}\" shape=\"rect\" placeholder=\"{{ c.slotPlaceholder }}\" hint-size=\"100%,96px\"><\u002Fx-import>\n                <\u002Fdiv>\n                <div style=\"padding:13px;\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:8px;\"><div style=\"font-size:15px;font-weight:700;line-height:1.2;\">{{ c.name }}<\u002Fdiv><div style=\"width:34px;height:34px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;{{ c.fitBg }}\">{{ c.fit }}<\u002Fdiv><\u002Fdiv>\n                  <div style=\"display:flex;align-items:baseline;gap:7px;margin-top:9px;\"><span style=\"font-size:17px;font-weight:800;color:#18181b;letter-spacing:-.3px;\">{{ c.tco }}<\u002Fspan><span style=\"font-size:11px;color:#a1a1aa;font-weight:600;\">all-in/mo<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;gap:8px;margin-top:7px;\"><span style=\"{{ c.dealStyle }}\">{{ c.dealLabel }}<\u002Fspan><span style=\"font-size:12px;color:#52525b;\">{{ c.otd }} OTD<\u002Fspan><\u002Fdiv>\n                  <div style=\"margin-top:8px;font-size:11px;color:#71717a;\">{{ c.condition }} · {{ c.fuelType }} · {{ c.dealer }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'landing', intakeStep: 1,\n    budgetMode: 'monthly', cashTotal: 28000, monthly: 450, term: 60, down: 3000, activePacket: 'crv', packetFrom: 'packets',\n    weights: { reliability: 80, resale: 55, running: 65, performance: 35 },\n    usage: ['commute'], timeline: 'month', radius: 60, zip: '94110', condition: 'either', fuel: 'either', fuelCost: 200,\n    mustHaves: { awd: true, carplay: true, backup: true, mpg: false, thirdrow: false, manual: false },\n    expanded: null, showNotes: false, scanStep: 0, demoOpen: true, copied: false,\n    alertsOpen: false, dismissedAlerts: [],\n    saved: ['crv','rav4'], compareSet: ['crv','cx5'], savedFilter: 'all', conditionFilter: 'all', fuelFilter: 'all', sortBy: 'fit', justSaved: null, compareSpecsOpen: false,\n    customMusts: [], newMust: ''\n  };\n  addCustomMust() {\n    this.setState(s => {\n      const v = s.newMust.trim();\n      if (!v || s.customMusts.some(c => c.toLowerCase() === v.toLowerCase())) return { newMust: '' };\n      return { customMusts: [...s.customMusts, v], newMust: '' };\n    });\n  }\n  removeCustomMust(v) { this.setState(s => ({ customMusts: s.customMusts.filter(x => x !== v) })); }\n\n  go(s) {\n    if (this._scan) { clearInterval(this._scan); this._scan = null; }\n    this.setState({ screen: s });\n    try { window.scrollTo(0, 0); } catch (e) {}\n  }\n  startIntake() { this.setState({ screen: 'intake', intakeStep: 1 }); try { window.scrollTo(0,0); } catch(e){} }\n  next() { this.setState(s => ({ intakeStep: Math.min(10, s.intakeStep + 1) })); try { window.scrollTo(0,0); } catch(e){} }\n  back() { this.setState(s => (s.intakeStep <= 1 ? { screen: 'landing' } : { intakeStep: s.intakeStep - 1 })); try { window.scrollTo(0,0); } catch(e){} }\n  goStep(n) { this.setState({ screen: 'intake', intakeStep: n }); try { window.scrollTo(0,0); } catch(e){} }\n  openPacket(id, from) { this.setState({ activePacket: id, packetFrom: from || 'packets', screen: 'packet' }); try { window.scrollTo(0,0); } catch(e){} }\n  goPackets() { this.setState({ screen: 'packets' }); try { window.scrollTo(0,0); } catch(e){} }\n\n  findCars() {\n    this.setState({ screen: 'scanning', scanStep: 0 });\n    try { window.scrollTo(0,0); } catch(e){}\n    if (this._scan) clearInterval(this._scan);\n    this._scan = setInterval(() => {\n      this.setState(st => {\n        const n = st.scanStep + 1;\n        if (n >= 5) { clearInterval(this._scan); this._scan = null; setTimeout(() => this.go('shortlist'), 1000); }\n        return { scanStep: n };\n      });\n    }, 850);\n  }\n\n  setW(k, v) { this.setState(s => ({ weights: { ...s.weights, [k]: +v } })); }\n  toggleMust(k) { this.setState(s => ({ mustHaves: { ...s.mustHaves, [k]: !s.mustHaves[k] } })); }\n  toggleExpand(id) { this.setState(s => ({ expanded: s.expanded === id ? null : id })); }\n  toggleSave(id) {\n    this.setState(s => {\n      const has = s.saved.includes(id);\n      return { saved: has ? s.saved.filter(x => x !== id) : [...s.saved, id], justSaved: has ? (s.justSaved === id ? null : s.justSaved) : id };\n    });\n    if (this._savedT) clearTimeout(this._savedT);\n    this._savedT = setTimeout(() => this.setState({ justSaved: null }), 3200);\n  }\n  toggleCompare(id) {\n    this.setState(s => {\n      if (s.compareSet.includes(id)) return { compareSet: s.compareSet.filter(x => x !== id) };\n      if (s.compareSet.length >= 3) return {};\n      return { compareSet: [...s.compareSet, id] };\n    });\n  }\n  setSavedFilter(v) { this.setState({ savedFilter: v }); }\n  toggleAlerts() { this.setState(s => ({ alertsOpen: !s.alertsOpen })); }\n  closeAlerts() { this.setState({ alertsOpen: false }); }\n  dismissAlert(id) { this.setState(s => ({ dismissedAlerts: [...s.dismissedAlerts, id] })); }\n  clearAllAlerts() { this.setState({ dismissedAlerts: this._alertIds() }); }\n  _alertIds() { return ['a1','a2','a3','a4']; }\n  openAlert(go) { this.setState({ alertsOpen: false }); if (go) this.go(go); }\n  openCompare() { this.go('compare'); }\n  clearCompare() { this.setState({ compareSet: [] }); }\n  componentWillUnmount() { if (this._scan) clearInterval(this._scan); if (this._savedT) clearTimeout(this._savedT); }\n\n  optStyle(active) {\n    return active\n      ? 'text-align:left;padding:16px 18px;border-radius:12px;border:2px solid #1e3a8a;background:#eef3fb;cursor:pointer;font-family:inherit;'\n      : 'text-align:left;padding:16px 18px;border-radius:12px;border:2px solid #e4e4e7;background:#fff;cursor:pointer;font-family:inherit;';\n  }\n\n  renderVals() {\n    const st = this.state;\n    const s = st.screen;\n    const navDefs = [\n      ['landing','Landing'],['intake','Intake'],['scanning','Scanning'],['shortlist','Shortlist'],['compare','Compare'],\n      ['replan','Re-plan'],['detail','Listing'],['packet','Packet'],['components','Components'],['mobile','Mobile']\n    ];\n    const nav = navDefs.map(([k, label]) => {\n      const active = s === k;\n      return {\n        label, onClick: () => (k === 'scanning' ? this.findCars() : this.go(k)),\n        style: 'white-space:nowrap;border:none;border-radius:7px
